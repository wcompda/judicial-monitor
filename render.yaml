services:
  - type: web
    name: judicial-monitor
    runtime: node
    buildCommand: npm install
    startCommand: node src/server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PASSWORD
        sync: false
      - key: USER_NAME
        sync: false
      - key: INTERVALO_HORAS
        sync: false
      - key: DATABASE_URL
        sync: false
